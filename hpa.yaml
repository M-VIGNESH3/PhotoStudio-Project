apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: photo-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: photo-app
  minReplicas: 3
  maxReplicas: 10
  metrics: 
    - type: Resources
      resource: 
        name: cpu
        target: 
          type: Utilization
          averageUtilization: 5
