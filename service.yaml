apiVersion: v1
kind: Service
metadata:
  name: photo-app
spec:
  selector:
    app: photo-app

  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: NodePort


---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP
